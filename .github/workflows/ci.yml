name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (DB engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { toolchain: "1.75" }
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo build --release
        working-directory: src/db_engine
      - run: cargo test
        working-directory: src/db_engine

  go:
    name: Go (Connectors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - run: sudo apt-get install -y protobuf-compiler protoc-gen-go
      - run: go build ./...
        working-directory: src/connectors
      - run: go test ./...
        working-directory: src/connectors

  python:
    name: Python (Scraper)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
        working-directory: src/scraper
      - run: python -m py_compile main.py
        working-directory: src/scraper

  cpp:
    name: C++ UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-multimedia-dev \
            libprotobuf-dev protobuf-compiler
      - run: |
          cmake -S src/ui -B src/ui/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build src/ui/build
